services:
  app:
    image: ${BURN_RATE_IMAGE:-loomitz/burnrate:v0.1.12}
    build:
      context: .
      dockerfile: Dockerfile
    environment:
      DB_NAME: ${DB_NAME:-burn_rate}
      DB_USER: ${DB_USER:-burn_rate}
      DB_PASSWORD: ${DB_PASSWORD:-change-me}
      DB_HOST: db
      DB_PORT: 5432
      DJANGO_SECRET_KEY: ${DJANGO_SECRET_KEY:-change-me}
      DJANGO_DEBUG: ${DJANGO_DEBUG:-false}
      DJANGO_ALLOWED_HOSTS: ${DJANGO_ALLOWED_HOSTS:-localhost,127.0.0.1}
      DJANGO_CORS_ALLOWED_ORIGINS: ${DJANGO_CORS_ALLOWED_ORIGINS:-http://localhost:5173,http://127.0.0.1:5173}
      DJANGO_CSRF_TRUSTED_ORIGINS: ${DJANGO_CSRF_TRUSTED_ORIGINS:-http://localhost:8000,http://127.0.0.1:8000}
      DJANGO_SECURE_SSL_REDIRECT: ${DJANGO_SECURE_SSL_REDIRECT:-false}
      DJANGO_SECURE_HSTS_SECONDS: ${DJANGO_SECURE_HSTS_SECONDS:-0}
      DJANGO_SECURE_HSTS_INCLUDE_SUBDOMAINS: ${DJANGO_SECURE_HSTS_INCLUDE_SUBDOMAINS:-false}
      DJANGO_SECURE_HSTS_PRELOAD: ${DJANGO_SECURE_HSTS_PRELOAD:-false}
      DJANGO_SESSION_COOKIE_SECURE: ${DJANGO_SESSION_COOKIE_SECURE:-false}
      DJANGO_CSRF_COOKIE_SECURE: ${DJANGO_CSRF_COOKIE_SECURE:-false}
      DJANGO_TRUST_X_FORWARDED_PROTO: ${DJANGO_TRUST_X_FORWARDED_PROTO:-false}
      DJANGO_SESSION_COOKIE_AGE: ${DJANGO_SESSION_COOKIE_AGE:-2592000}
      DJANGO_SESSION_SAVE_EVERY_REQUEST: ${DJANGO_SESSION_SAVE_EVERY_REQUEST:-true}
      DJANGO_SESSION_COOKIE_SAMESITE: ${DJANGO_SESSION_COOKIE_SAMESITE:-Lax}
      DJANGO_CSRF_COOKIE_SAMESITE: ${DJANGO_CSRF_COOKIE_SAMESITE:-Lax}
      INVITATION_TTL_DAYS: ${INVITATION_TTL_DAYS:-14}
      BURN_RATE_PUBLIC_URL: ${BURN_RATE_PUBLIC_URL:-http://localhost:8000}
      BURN_RATE_FRONTEND_URL: ${BURN_RATE_FRONTEND_URL:-http://localhost:8000}
      BURN_RATE_INVITATION_ACCEPT_URL: ${BURN_RATE_INVITATION_ACCEPT_URL:-}
      EMAIL_HOST: ${EMAIL_HOST:-}
      EMAIL_PORT: ${EMAIL_PORT:-587}
      EMAIL_HOST_USER: ${EMAIL_HOST_USER:-}
      EMAIL_HOST_PASSWORD: ${EMAIL_HOST_PASSWORD:-}
      EMAIL_USE_TLS: ${EMAIL_USE_TLS:-true}
      EMAIL_USE_SSL: ${EMAIL_USE_SSL:-false}
      DEFAULT_FROM_EMAIL: ${DEFAULT_FROM_EMAIL:-}
      RUN_MIGRATIONS: ${RUN_MIGRATIONS:-true}
      COLLECT_STATIC: ${COLLECT_STATIC:-true}
      WAIT_FOR_DB: ${WAIT_FOR_DB:-true}
      DB_WAIT_TIMEOUT: ${DB_WAIT_TIMEOUT:-30}
      GUNICORN_WORKERS: ${GUNICORN_WORKERS:-3}
      GUNICORN_TIMEOUT: ${GUNICORN_TIMEOUT:-60}
    ports:
      - "${APP_BIND:-127.0.0.1}:${APP_PORT:-8000}:8000"
    depends_on:
      db:
        condition: service_healthy
    healthcheck:
      test:
        [
          "CMD-SHELL",
          "python -c \"import urllib.request; urllib.request.urlopen('http://127.0.0.1:8000/healthz/', timeout=3).read()\"",
        ]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 30s

  db:
    image: postgres:16-alpine
    environment:
      POSTGRES_DB: ${DB_NAME:-burn_rate}
      POSTGRES_USER: ${DB_USER:-burn_rate}
      POSTGRES_PASSWORD: ${DB_PASSWORD:-change-me}
    volumes:
      - burn_rate_postgres:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${DB_USER:-burn_rate} -d ${DB_NAME:-burn_rate}"]
      interval: 5s
      timeout: 5s
      retries: 10

volumes:
  burn_rate_postgres:
